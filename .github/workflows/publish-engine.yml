name: Publish Engine

# Publica @fiscal-digital/engine no GitHub Packages npm.
#
# Triggers:
#   - workflow_dispatch (manual via UI): Diego decide quando publicar.
#   - push de tag `engine-v*` (ex: `engine-v0.1.0`, `engine-v0.2.1`): tag
#     namespaced para nao conflitar com tags de release de Lambdas no futuro.
#
# Auth: GITHUB_TOKEN com `packages: write` (gerenciado automaticamente pelo
# Actions runner, sem secret extra).

on:
  workflow_dispatch:
  push:
    tags:
      - 'engine-v*'

permissions:
  contents: read
  packages: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # GH_TOKEN no job-level: prepack do engine (npm pack/publish disparam build →
    # prebuild → sync-brand.mjs que chama `gh api`). Sem token no escopo do prepack,
    # falha com "set the GH_TOKEN environment variable".
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@fiscal-digital'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build engine
        run: npm run build -w packages/engine

      - name: Sanity check — require built engine
        run: node -e "require('./packages/engine/dist/index.js')"

      - name: Validate tarball (dry-run)
        working-directory: packages/engine
        run: npm pack --dry-run

      - name: Publish to GitHub Packages
        working-directory: packages/engine
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: npm publish
