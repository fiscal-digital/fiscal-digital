name: Deploy

on:
  push:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build shared libs
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run build -w packages/engine

      - name: Bundle Lambdas
        run: |
          npm run bundle --workspace=packages/analyzer
          npm run bundle --workspace=packages/publisher
          npm run bundle --workspace=packages/api
          npm run bundle --workspace=packages/costs

      - name: Zip Lambdas
        run: |
          for pkg in analyzer publisher api costs; do
            zip -j packages/$pkg/dist/function.zip packages/$pkg/dist/index.js
          done

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      # Plan separado pra inspecionar destroys criticos antes de apply.
      # Guarda contra incidente P0 2026-06-07 (LRN-20260607-004): apply em
      # cascata destruiu aws_s3_bucket_policy.web + PAB sem recriar bucket
      # em flake AWS API, deixando site fiscaldigital.org com assets 404.
      - name: Terraform Plan
        working-directory: terraform
        run: terraform plan -var-file=environments/prod.tfvars -out=tfplan.bin

      - name: Guard destroys criticos (LRN-20260607-004)
        working-directory: terraform
        run: |
          terraform show -no-color tfplan.bin > plan-text.txt

          # Resources OAC-criticos: destroy sem recreate quebra site
          CRITICAL_PATTERNS=(
            "module\.web\.aws_s3_bucket_policy\.web"
            "module\.web\.aws_s3_bucket_public_access_block\.web"
            "module\.web\.aws_s3_bucket\.web"
            "module\.gazettes_cache\.aws_s3_bucket_policy\.gazettes_cache"
            "module\.gazettes_cache\.aws_s3_bucket\.gazettes_cache"
          )

          FAIL=0
          for pattern in "${CRITICAL_PATTERNS[@]}"; do
            if grep -E "^  # ${pattern}.*will be destroyed" plan-text.txt; then
              echo "::error::Destroy critico detectado: ${pattern}"
              echo "::error::Bypass: commit tag [allow-critical-destroy] no PR e re-rodar"
              FAIL=1
            fi
          done

          if [ $FAIL -eq 1 ]; then
            # Bypass: se commit message tem [allow-critical-destroy], deixar passar
            COMMIT_MSG=$(git log -1 --pretty=%B)
            if echo "$COMMIT_MSG" | grep -qF "[allow-critical-destroy]"; then
              echo "::warning::Bypass aceito via [allow-critical-destroy] no commit message"
              exit 0
            fi
            exit 1
          fi
          echo "Plan sem destroys criticos — OK"

      - name: Terraform Apply
        working-directory: terraform
        run: terraform apply tfplan.bin

      - name: Deploy Lambda code
        run: |
          for pkg in analyzer publisher api costs; do
            aws lambda update-function-code \
              --function-name fiscal-digital-${pkg}-prod \
              --zip-file fileb://packages/${pkg}/dist/function.zip \
              --no-cli-pager
            aws lambda wait function-updated \
              --function-name fiscal-digital-${pkg}-prod \
              --no-cli-pager
            VERSION=$(aws lambda publish-version \
              --function-name fiscal-digital-${pkg}-prod \
              --no-cli-pager \
              --query Version --output text)
            aws lambda update-alias \
              --function-name fiscal-digital-${pkg}-prod \
              --name prod \
              --function-version "$VERSION" \
              --no-cli-pager 2>/dev/null || \
            aws lambda create-alias \
              --function-name fiscal-digital-${pkg}-prod \
              --name prod \
              --function-version "$VERSION" \
              --no-cli-pager
          done

      # Smoke test pos-deploy: detecta repeticao do P0 2026-06-07 (LRN-004).
      # Sintoma daquele incidente: bucket policy do web sumiu, assets 404 via
      # CloudFront mas HTML continuou 200. Aqui validamos o que falhou la.
      - name: Smoke test pos-apply (LRN-20260607-004)
        run: |
          set -e

          echo "1. Bucket policy do web presente?"
          aws s3api get-bucket-policy --bucket fiscal-digital-web-prod --region us-east-1 > /dev/null

          echo "2. PAB do web presente?"
          aws s3api get-public-access-block --bucket fiscal-digital-web-prod --region us-east-1 > /dev/null

          echo "3. Asset via CloudFront retorna 200?"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" "https://fiscaldigital.org/brand/logo/symbol.svg")
          if [ "$HTTP" != "200" ]; then
            echo "::error::Asset retornou HTTP $HTTP (esperado 200)"
            exit 1
          fi

          echo "4. Home pt-br retorna 200?"
          HTTP=$(curl -s -o /dev/null -w "%{http_code}" -L "https://fiscaldigital.org/pt-br/")
          if [ "$HTTP" != "200" ]; then
            echo "::error::Home retornou HTTP $HTTP (esperado 200)"
            exit 1
          fi

          echo "Smoke test PASS — site saudavel pos-deploy"
