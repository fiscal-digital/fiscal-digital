name: Gitleaks

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v6

      # `dir` escaneia a working tree (nao o historico git): o objetivo do
      # gate e impedir vazamento NOVO. Historico ja auditado manualmente.
      - name: Run gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz | tar -xz gitleaks
          ./gitleaks dir . --config .gitleaks.toml --no-banner --redact -v
