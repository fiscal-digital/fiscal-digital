name: Terraform Plan + Lint + Test

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

# Serializa runs que tocam o terraform state remoto.
# Sem isso, múltiplos PRs com update-branch em paralelo competem pelo lock
# DynamoDB (`fiscal-digital-terraform-state`) e ~50% dos plans falham com
# `Error acquiring the state lock / ConditionalCheckFailedException`.
# Ver LRN-20260510-003. `cancel-in-progress: false` preserva runs em fila
# (não cancelados) — cada PR roda seu plan, só não simultâneo.
concurrency:
  group: terraform-state-prod
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run lint

      - name: Build engine (consumido pelos outros workspaces)
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run build -w packages/engine

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000 -o /dev/null; then
              echo "DynamoDB Local up"; break
            fi
            echo "waiting for DDB Local... ($i)"; sleep 1
          done

      - name: Test (unit + integration with DDB Local)
        env:
          GH_TOKEN: ${{ github.token }}
          DDB_ENDPOINT: http://localhost:8000
          NODE_OPTIONS: --experimental-vm-modules
        run: npm test

      # ─── Pipeline de infra (precisa de secrets) ──────────────────────────
      # Steps abaixo NAO rodam em PR de fork: secrets nao sao expostos a
      # forks por design de seguranca do GitHub Actions. PR de fork passa
      # com lint + test (acima); pipeline terraform fica para PR interno.
      # Ver LRN-20260523-003.
      - name: Configure AWS credentials (OIDC)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: hashicorp/setup-terraform@v4

      - name: Cache Terraform plugins
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/cache@v6
        with:
          path: ~/.terraform.d/plugin-cache
          key: tf-plugins-${{ runner.os }}-${{ hashFiles('terraform/**/.terraform.lock.hcl') }}
          restore-keys: |
            tf-plugins-${{ runner.os }}-

      - name: Configure Terraform plugin cache
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: |
          mkdir -p ~/.terraform.d/plugin-cache
          echo 'plugin_cache_dir = "$HOME/.terraform.d/plugin-cache"' >> ~/.terraformrc

      - name: Terraform fmt check
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: terraform
        run: terraform validate

      - name: Setup tflint
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run tflint
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive --format=compact --minimum-failure-severity=error

      - name: Setup Python (for checkov)
        if: github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install checkov
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: pip install -r requirements.txt

      - name: Run checkov
        if: github.event.pull_request.head.repo.full_name == github.repository
        # TODO: revisar e endereçar checks pulados em PR de hardening de infra.
        # Lista atual reflete o estado de prod ao introduzir o gate (PR #1).
        # Resources afetados: gazettes-cache (S3+CF), iam roles, lambdas.
        working-directory: terraform
        run: |
          checkov \
            --directory . \
            --framework terraform \
            --quiet \
            --skip-check CKV_AWS_18,CKV_AWS_21,CKV_AWS_28,CKV_AWS_50,CKV_AWS_68,CKV_AWS_86,CKV_AWS_115,CKV_AWS_116,CKV_AWS_117,CKV_AWS_144,CKV_AWS_145,CKV_AWS_158,CKV_AWS_173,CKV_AWS_258,CKV_AWS_259,CKV_AWS_272,CKV_AWS_289,CKV_AWS_290,CKV_AWS_300,CKV_AWS_305,CKV_AWS_310,CKV_AWS_338,CKV_AWS_355,CKV_AWS_374,CKV2_AWS_32,CKV2_AWS_34,CKV2_AWS_47,CKV2_AWS_57,CKV2_AWS_61,CKV2_AWS_62,CKV2_AWS_64,CKV2_AWS_67,CKV2_AWS_75

      - name: AWS quota check (LRN-20260503-020)
        if: github.event.pull_request.head.repo.full_name == github.repository
        run: node scripts/aws-quota-check.mjs

      - name: Terraform Plan
        id: plan
        if: github.event.pull_request.head.repo.full_name == github.repository
        working-directory: terraform
        run: |
          set -o pipefail
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color \
            -input=false \
            -out=tfplan.bin 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/upload-artifact@v7
        with:
          name: tfplan
          path: terraform/tfplan.bin
          retention-days: 7

      - name: Comment Plan on PR
        if: always() && github.event.pull_request.head.repo.full_name == github.repository
        uses: actions/github-script@v9
        env:
          PLAN_PATH: terraform/plan.txt
        with:
          script: |
            const fs = require('fs')
            const path = process.env.PLAN_PATH
            let body = '### Terraform Plan\n\n'
            try {
              let plan = fs.readFileSync(path, 'utf8')
              const MAX = 60_000
              if (plan.length > MAX) {
                plan = plan.slice(0, MAX) + '\n\n[truncated — full output in artifact `tfplan`]'
              }
              body += '```hcl\n' + plan + '\n```'
            } catch (e) {
              body += '_plan output unavailable: ' + e.message + '_'
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('### Terraform Plan')
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      - name: Fail if plan errored
        if: github.event.pull_request.head.repo.full_name == github.repository && steps.plan.outputs.exitcode != '0'
        run: |
          echo "Terraform plan failed (exit=${{ steps.plan.outputs.exitcode }})"
          exit 1
