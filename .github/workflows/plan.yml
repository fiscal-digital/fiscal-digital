name: Terraform Plan + Lint + Test

on:
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read
  pull-requests: write

jobs:
  validate:
    runs-on: ubuntu-latest

    services:
      dynamodb:
        image: amazon/dynamodb-local:latest
        ports:
          - 8000:8000

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        env:
          GH_TOKEN: ${{ github.token }}
        run: npm run lint

      - name: Wait for DynamoDB Local
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:8000 -o /dev/null; then
              echo "DynamoDB Local up"; break
            fi
            echo "waiting for DDB Local... ($i)"; sleep 1
          done

      - name: Test (unit + integration with DDB Local)
        env:
          GH_TOKEN: ${{ github.token }}
          DDB_ENDPOINT: http://localhost:8000
          NODE_OPTIONS: --experimental-vm-modules
        run: npm test

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: us-east-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4

      - name: Terraform fmt check
        working-directory: terraform
        run: terraform fmt -check -recursive

      - name: Terraform Init
        working-directory: terraform
        run: terraform init

      - name: Terraform Validate
        working-directory: terraform
        run: terraform validate

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v6
        with:
          tflint_version: latest

      - name: Run tflint
        working-directory: terraform
        run: |
          tflint --init
          tflint --recursive --format=compact

      - name: Run checkov
        uses: bridgecrewio/checkov-action@v12
        with:
          directory: terraform
          framework: terraform
          quiet: true
          soft_fail: false
          skip_check: >-
            CKV_AWS_158,
            CKV_AWS_338,
            CKV2_AWS_67,
            CKV_AWS_18,
            CKV_AWS_144,
            CKV2_AWS_62,
            CKV_AWS_50,
            CKV_AWS_115,
            CKV_AWS_116,
            CKV_AWS_117

      - name: AWS quota check (LRN-20260503-020)
        run: node scripts/aws-quota-check.mjs

      - name: Terraform Plan
        id: plan
        working-directory: terraform
        run: |
          set -o pipefail
          terraform plan \
            -var-file=environments/prod.tfvars \
            -no-color \
            -input=false \
            -out=tfplan.bin 2>&1 | tee plan.txt
          echo "exitcode=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT

      - name: Upload plan artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: terraform/tfplan.bin
          retention-days: 7

      - name: Comment Plan on PR
        if: always()
        uses: actions/github-script@v7
        env:
          PLAN_PATH: terraform/plan.txt
        with:
          script: |
            const fs = require('fs')
            const path = process.env.PLAN_PATH
            let body = '### Terraform Plan\n\n'
            try {
              let plan = fs.readFileSync(path, 'utf8')
              const MAX = 60_000
              if (plan.length > MAX) {
                plan = plan.slice(0, MAX) + '\n\n[truncated — full output in artifact `tfplan`]'
              }
              body += '```hcl\n' + plan + '\n```'
            } catch (e) {
              body += '_plan output unavailable: ' + e.message + '_'
            }
            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            })
            const existing = comments.find(c =>
              c.user.type === 'Bot' && c.body.startsWith('### Terraform Plan')
            )
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              })
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              })
            }

      - name: Fail if plan errored
        if: steps.plan.outputs.exitcode != '0'
        run: |
          echo "Terraform plan failed (exit=${{ steps.plan.outputs.exitcode }})"
          exit 1
